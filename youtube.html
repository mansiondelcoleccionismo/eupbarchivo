<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>EUPB Museo — YouTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="youtube.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="hdr">
      <div class="hdr-in">
        <div class="logo">EUPB <span>ARCHIVO</span></div>
        <nav class="hdr-nav">
          <a href="index.html" class="nl">CATÁLOGO</a>
          <a href="index.html#artistas" class="nl">ARTISTAS</a>
          <a href="index.html#ranking" class="nl">RANKING</a>
          <a href="youtube.html" class="nl on">YOUTUBE</a>
          <a href="index.html#perfil" class="nl">MI PERFIL</a>
          <a class="btn3d" href="museo.html">MUSEO 3D →</a>
        </nav>
        <button class="hdr-burger" id="hdr-burger" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <!-- DRAWER -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <nav class="drawer" id="drawer">
      <div class="drawer-hd">
        <span class="drawer-logo">EUPB <span>ARCHIVO</span></span>
        <button class="drawer-x" id="drawer-x" aria-label="Cerrar menú">✕</button>
      </div>
      <div class="drawer-links">
        <a href="index.html" class="drawer-link">CATÁLOGO</a>
        <a href="index.html#artistas" class="drawer-link">ARTISTAS</a>
        <a href="index.html#ranking" class="drawer-link">RANKING</a>
        <a href="youtube.html" class="drawer-link on">YOUTUBE</a>
        <a href="index.html#perfil" class="drawer-link">MI PERFIL</a>
      </div>
      <a class="drawer-3d" href="museo.html">MUSEO 3D →</a>
    </nav>

    <!-- BARRA DE BÚSQUEDA STICKY -->
    <div class="search-bar">
      <div class="search-inner">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            class="search-input"
            id="search-input"
            type="text"
            placeholder="Buscar vídeo, artista, canal..."
            aria-label="Buscar vídeo"
            autocomplete="off"
            spellcheck="false"
          />
          <button
            class="search-clear"
            id="search-clear"
            aria-label="Borrar búsqueda"
          >
            ✕
          </button>
        </div>
        <div class="search-tags" id="filters">
          <button class="yt-tag on" data-tag="todo">TODO</button>
          <button class="yt-tag" data-tag="canal">MI CANAL</button>
          <button class="yt-tag" data-tag="mixes">EUPB MIXES</button>
          <button class="yt-tag" data-tag="discos">DISCOS COMPLETOS</button>
          <button class="yt-tag" data-tag="special">SPECIAL 50K</button>
        </div>
        <button class="rand-btn" id="rand-btn">🎲 MODO ALEATORIO</button>
      </div>
    </div>

    <!-- MAIN -->
    <main class="yt-main">
      <div
        id="cache-bar"
        style="
          display: none;
          align-items: center;
          justify-content: center;
          gap: 8px;
          font-family: var(--fd);
          font-size: 0.45rem;
          letter-spacing: 0.1em;
          color: var(--gr);
          background: var(--sf);
          border: 1px solid var(--bd);
          border-radius: 4px;
          padding: 8px 16px;
          margin-bottom: 16px;
          transition: opacity 0.4s;
        "
      ></div>
      <div class="results-bar">
        <h2>BIBLIOTECA DE <span>VÍDEOS</span></h2>
        <span class="results-count" id="vcount"></span>
      </div>
      <div class="vgrid" id="vgrid"></div>
    </main>

    <footer class="yt-footer">
      EUPB MUSEO ·
      <a
        href="https://www.youtube.com/@elultimoplanb"
        target="_blank"
        rel="noopener"
        >CANAL YOUTUBE</a
      >
      · ARCHIVO DIGITAL DEL RAP EN ESPAÑOL
    </footer>

    <!-- MODAL PLAYER -->
    <div class="mo-overlay" id="mo-overlay">
      <div class="mo-box">
        <button class="mo-close" id="mo-close" aria-label="Cerrar">✕</button>
        <div class="mo-rand-badge" id="mo-rand-badge">
          <div class="mo-rand-badge-dot"></div>
          MODO ALEATORIO ACTIVO
        </div>
        <div class="mo-player">
          <iframe
            id="mo-iframe"
            src=""
            allow="autoplay; encrypted-media"
            allowfullscreen
          ></iframe>
          <div class="mo-autoplay" id="mo-autoplay" style="display: none"></div>
        </div>
        <div class="mo-info">
          <div class="mo-title" id="mo-title"></div>
          <div class="mo-meta" id="mo-meta"></div>
          <div class="mo-progress-txt" id="mo-progress"></div>
        </div>
        <div class="mo-nav">
          <button class="mo-btn" id="mo-prev">◀ ANTERIOR</button>
          <button class="mo-btn primary" id="mo-next-btn">SIGUIENTE ▶</button>
        </div>
      </div>
    </div>

    <script>
      // ═══════════════════════════════════
      // CONFIG
      // ═══════════════════════════════════
      const API_KEY = "AIzaSyBZntLJGuG0VZTytBEQo3qJIrAyl8G6Rqo";
      const CHANNEL_ID = "UCXKE_M2jZBiuERyA2qHIcnQ";

      // Playlists externas con su tag
      const PLAYLISTS = [
        {
          id: "PL25Z1cmElvzqa_atTrtQLfGB03q5Y-tPS",
          tag: "mixes",
          label: "EUPB",
        },
        {
          id: "PL25Z1cmElvzr6EpMNVkw2d6AJTFTxlh6V",
          tag: "discos",
          label: "EUPB",
        },
        {
          id: "PL25Z1cmElvzpNlMB7X6I8Hz11eqFNXGVC",
          tag: "special",
          label: "EUPB",
        },
      ];

      // Vídeos extra de otros canales — añade aquí los que quieras
      // { id, title, channel, date, tags: ["extra"] }
      const EXTRA_VIDEOS = [
        // { id: "XXX", title: "Título", channel: "Otro Canal", date: "1 Ene 2025", tags: ["extra"] },
      ];

      // ═══════════════════════════════════
      // ESTADO
      // ═══════════════════════════════════
      let shuffled = [];
      let activeTag = "todo";
      let searchQ = "";
      let currentIdx = -1;
      let randomMode = false;

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function thumbUrl(id) {
        return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
      }

      function fmtDate(iso) {
        return new Date(iso).getFullYear().toString();
      }

      function getFiltered() {
        let list = shuffled;
        if (activeTag !== "todo")
          list = list.filter((v) => v.tags.includes(activeTag));
        if (searchQ) {
          const q = searchQ.toLowerCase();
          list = list.filter(
            (v) =>
              v.title.toLowerCase().includes(q) ||
              v.channel.toLowerCase().includes(q) ||
              v.tags.some((t) => t.includes(q))
          );
        }
        return list;
      }

      // ═══════════════════════════════════
      // CARGA DESDE YOUTUBE API
      // ═══════════════════════════════════
      function showLoading() {
        document.getElementById(
          "vgrid"
        ).innerHTML = `<div class="yt-empty"><span style="font-size:2rem;animation:spin 1s linear infinite;display:inline-block">⟳</span><br>CARGANDO VÍDEOS...</div>`;
        document.getElementById("vcount").textContent = "";
      }

      function showError(msg) {
        document.getElementById(
          "vgrid"
        ).innerHTML = `<div class="yt-empty"><span>⚠</span>${msg}</div>`;
      }

      async function fetchPlaylistVideos(playlistId, apiKey, tag, label) {
        const videos = [];
        let pageToken = "";
        do {
          const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}${
            pageToken ? "&pageToken=" + pageToken : ""
          }`;
          const res = await fetch(url);
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          for (const item of data.items) {
            const s = item.snippet;
            const vidId = s.resourceId?.videoId;
            if (
              !vidId ||
              vidId === "deleted" ||
              s.title === "Private video" ||
              s.title === "Deleted video"
            )
              continue;
            videos.push({
              id: vidId,
              title: s.title,
              channel: label,
              date: fmtDate(s.publishedAt),
              tags: [tag],
            });
          }
          pageToken = data.nextPageToken || "";
        } while (pageToken);
        return videos;
      }

      async function fetchAllVideos(channelId, apiKey) {
        // 1. Obtener el playlist "uploads" del canal
        const chRes = await fetch(
          `https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&id=${channelId}&key=${apiKey}`
        );
        const chData = await chRes.json();
        if (!chData.items || !chData.items.length)
          throw new Error("Canal no encontrado");

        const channelTitle = chData.items[0].snippet.title;
        const uploadsId =
          chData.items[0].contentDetails.relatedPlaylists.uploads;

        // 2. Paginar por todos los vídeos del playlist
        const videos = [];
        let pageToken = "";
        do {
          const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${uploadsId}&key=${apiKey}${
            pageToken ? "&pageToken=" + pageToken : ""
          }`;
          const res = await fetch(url);
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);

          for (const item of data.items) {
            const s = item.snippet;
            const vidId = s.resourceId.videoId;
            if (!vidId) continue;
            videos.push({
              id: vidId,
              title: s.title,
              channel: "EUPB",
              date: fmtDate(s.publishedAt),
              tags: ["canal"],
            });
          }
          pageToken = data.nextPageToken || "";
        } while (pageToken);

        return videos;
      }

      const CACHE_KEY = "eupb_yt_videos";
      const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 horas en ms

      function loadCache() {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return null;
          const { ts, videos } = JSON.parse(raw);
          if (Date.now() - ts > CACHE_TTL) return null;
          return videos;
        } catch (_) {
          return null;
        }
      }

      function saveCache(videos) {
        try {
          localStorage.setItem(
            CACHE_KEY,
            JSON.stringify({ ts: Date.now(), videos })
          );
        } catch (_) {}
      }

      async function init() {
        // Intentar caché primero
        const cached = loadCache();
        if (cached) {
          shuffled = shuffle([...cached, ...EXTRA_VIDEOS]);
          render();
          showCacheBadge(true);
          return;
        }
        // Si no hay caché, cargar desde API
        showLoading();
        try {
          const channelVideos = await fetchAllVideos(CHANNEL_ID, API_KEY);

          // Cargar playlists externas en paralelo
          const playlistResults = await Promise.allSettled(
            PLAYLISTS.map((pl) =>
              fetchPlaylistVideos(pl.id, API_KEY, pl.tag, pl.label)
            )
          );
          const playlistVideos = playlistResults.flatMap((r) =>
            r.status === "fulfilled" ? r.value : []
          );

          const allVideos = [...channelVideos, ...playlistVideos];
          saveCache(allVideos);
          shuffled = shuffle([...allVideos, ...EXTRA_VIDEOS]);
          render();
          showCacheBadge(false);
        } catch (err) {
          console.error(err);
          showError("ERROR AL CARGAR LOS VÍDEOS: " + err.message);
        }
      }

      function showCacheBadge(fromCache) {
        const bar = document.getElementById("cache-bar");
        if (fromCache) {
          bar.innerHTML = `
            BIBLIOTECA CARGADA DESDE CACHÉ
            <button onclick="forceRefresh()" style="margin-left:12px;background:none;border:1px solid currentColor;color:inherit;font-family:var(--fd);font-size:0.4rem;letter-spacing:0.08em;padding:3px 10px;border-radius:3px;cursor:pointer">
              ↺ ACTUALIZAR
            </button>`;
          bar.style.display = "flex";
        } else {
          bar.innerHTML = `✓ ${shuffled.length} VÍDEOS CARGADOS Y GUARDADOS EN CACHÉ`;
          bar.style.display = "flex";
          setTimeout(() => {
            bar.style.opacity = "0";
            setTimeout(() => (bar.style.display = "none"), 400);
          }, 3000);
        }
      }

      async function forceRefresh() {
        localStorage.removeItem(CACHE_KEY);
        document.getElementById("cache-bar").style.display = "none";
        showLoading();
        try {
          const channelVideos = await fetchAllVideos(CHANNEL_ID, API_KEY);
          const playlistResults = await Promise.allSettled(
            PLAYLISTS.map((pl) =>
              fetchPlaylistVideos(pl.id, API_KEY, pl.tag, pl.label)
            )
          );
          const playlistVideos = playlistResults.flatMap((r) =>
            r.status === "fulfilled" ? r.value : []
          );
          const allVideos = [...channelVideos, ...playlistVideos];
          saveCache(allVideos);
          shuffled = shuffle([...allVideos, ...EXTRA_VIDEOS]);
          render();
          showCacheBadge(false);
        } catch (err) {
          showError("ERROR AL ACTUALIZAR: " + err.message);
        }
      }

      // ═══════════════════════════════════
      // RENDER
      // ═══════════════════════════════════
      function render() {
        const list = getFiltered();
        const grid = document.getElementById("vgrid");
        document.getElementById("vcount").textContent =
          list.length + " VÍDEO" + (list.length !== 1 ? "S" : "");

        if (!list.length) {
          grid.innerHTML = `<div class="yt-empty"><span>▶</span>SIN RESULTADOS</div>`;
          return;
        }

        grid.innerHTML = list
          .map(
            (v, i) => `
          <div class="vcard${
            currentIdx === i ? " playing" : ""
          }" data-idx="${i}" onclick="openVideo(${i})">
            <div class="vcard-thumb">
              <img src="${thumbUrl(v.id)}" alt="" loading="lazy" />
              <div class="vcard-overlay"><div class="vcard-play">▶</div></div>
            </div>
            <div class="vcard-body">
              <div class="vcard-title">${v.title}</div>
              <div class="vcard-meta">
                <span class="vcard-ch">${v.channel.toUpperCase()}</span>
                <span class="vcard-dot">·</span>
                <span>${v.date}</span>
              </div>
            </div>
          </div>`
          )
          .join("");
      }

      // ═══════════════════════════════════
      // PLAYER
      // ═══════════════════════════════════
      function openVideo(idx) {
        const list = getFiltered();
        if (idx < 0 || idx >= list.length) return;
        currentIdx = idx;
        const v = list[idx];

        cancelAutoplay();

        document.getElementById(
          "mo-iframe"
        ).src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
        document.getElementById("mo-title").textContent = v.title;
        document.getElementById(
          "mo-meta"
        ).innerHTML = `<span>${v.channel.toUpperCase()}</span> · ${v.date}`;
        document.getElementById("mo-progress").textContent = randomMode
          ? `MODO ALEATORIO · ${list.length} VÍDEOS`
          : `VÍDEO ${idx + 1} DE ${list.length}`;
        document.getElementById("mo-prev").disabled = randomMode
          ? false
          : idx === 0;
        document.getElementById("mo-next-btn").disabled = randomMode
          ? false
          : idx === list.length - 1;

        // badge modo aleatorio
        document
          .getElementById("mo-rand-badge")
          .classList.toggle("show", randomMode);

        document.getElementById("mo-overlay").classList.add("show");
        document.body.style.overflow = "hidden";

        // Marcar card activa
        document
          .querySelectorAll(".vcard")
          .forEach((c) => c.classList.remove("playing"));
        const card = document.querySelector(`.vcard[data-idx="${idx}"]`);
        if (card) {
          card.classList.add("playing");
          card.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      function closeModal() {
        cancelAutoplay();
        document.getElementById("mo-iframe").src = "";
        document.getElementById("mo-overlay").classList.remove("show");
        document.body.style.overflow = "";
        document
          .querySelectorAll(".vcard")
          .forEach((c) => c.classList.remove("playing"));
        currentIdx = -1;
        // salir de modo aleatorio al cerrar
        if (randomMode) toggleRandomMode(false);
      }

      function goNext() {
        const list = getFiltered();
        if (randomMode) {
          // en modo aleatorio: elegir cualquiera al azar distinto al actual
          let nextIdx;
          do {
            nextIdx = Math.floor(Math.random() * list.length);
          } while (list.length > 1 && nextIdx === currentIdx);
          openVideo(nextIdx);
        } else {
          if (currentIdx < list.length - 1) openVideo(currentIdx + 1);
        }
      }

      function goPrev() {
        if (randomMode) {
          const list = getFiltered();
          let nextIdx;
          do {
            nextIdx = Math.floor(Math.random() * list.length);
          } while (list.length > 1 && nextIdx === currentIdx);
          openVideo(nextIdx);
        } else {
          if (currentIdx > 0) openVideo(currentIdx - 1);
        }
      }

      function toggleRandomMode(force) {
        randomMode = force !== undefined ? force : !randomMode;
        const btn = document.getElementById("rand-btn");
        btn.classList.toggle("active", randomMode);
        btn.textContent = randomMode
          ? "⏹ DETENER ALEATORIO"
          : "🎲 MODO ALEATORIO";
        if (randomMode) {
          // arrancar con un vídeo al azar
          const list = getFiltered();
          if (!list.length) return;
          const idx = Math.floor(Math.random() * list.length);
          openVideo(idx);
        }
      }

      function cancelAutoplay() {}

      // ═══════════════════════════════════
      // EVENTOS
      // ═══════════════════════════════════
      document.getElementById("mo-close").onclick = closeModal;
      document.getElementById("mo-overlay").onclick = (e) => {
        if (e.target === document.getElementById("mo-overlay")) closeModal();
      };
      document.getElementById("mo-next-btn").onclick = goNext;
      document.getElementById("mo-prev").onclick = goPrev;
      document.getElementById("rand-btn").onclick = () => toggleRandomMode();

      document.addEventListener("keydown", (e) => {
        if (!document.getElementById("mo-overlay").classList.contains("show"))
          return;
        if (e.key === "Escape") closeModal();
        if (e.key === "ArrowRight") goNext();
        if (e.key === "ArrowLeft") goPrev();
      });

      // Búsqueda
      const searchInput = document.getElementById("search-input");
      const searchClear = document.getElementById("search-clear");
      searchInput.addEventListener("input", () => {
        searchQ = searchInput.value.trim();
        searchClear.classList.toggle("vis", searchQ.length > 0);
        render();
      });
      searchClear.onclick = () => {
        searchInput.value = "";
        searchQ = "";
        searchClear.classList.remove("vis");
        searchInput.focus();
        render();
      };

      // Filtros de categoría
      document.getElementById("filters").addEventListener("click", (e) => {
        const btn = e.target.closest(".yt-tag");
        if (!btn) return;
        document
          .querySelectorAll(".yt-tag")
          .forEach((b) => b.classList.remove("on"));
        btn.classList.add("on");
        activeTag = btn.dataset.tag;
        render();
      });

      // Hamburger
      const burger = document.getElementById("hdr-burger");
      const drawer = document.getElementById("drawer");
      const drawerOverlay = document.getElementById("drawer-overlay");
      function openDrawer() {
        burger.classList.add("open");
        drawer.classList.add("open");
        drawerOverlay.classList.add("show");
        document.body.style.overflow = "hidden";
      }
      function closeDrawer() {
        burger.classList.remove("open");
        drawer.classList.remove("open");
        drawerOverlay.classList.remove("show");
        document.body.style.overflow = "";
      }
      burger.onclick = openDrawer;
      document.getElementById("drawer-x").onclick = closeDrawer;
      drawerOverlay.onclick = closeDrawer;

      // INIT — cargar desde API y mezclar
      init();
    </script>
  </body>
</html>
